# ─────────────────────────────────────────────────────────────────────────────
# Rift Batch Changes Platform — Full local stack
#
# Services:
#   Infrastructure : mongodb, redis, temporal-postgresql, temporal, temporal-ui, seaweedfs
#   Application    : api, worker, frontend
#
# Usage:
#   docker compose up --build        # first run (builds images)
#   docker compose up                # subsequent runs
#   docker compose up api worker     # just backend services
#   docker compose logs -f api       # follow API logs
#
# Access:
#   Frontend        → http://localhost:3000
#   API / docs      → http://localhost:8000/docs
#   Temporal        → http://localhost:8088
#   SeaweedFS S3    → http://localhost:9000  (default S3 credentials in .env.example)
#   SeaweedFS Filer → http://localhost:8888
# ─────────────────────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  APP_ENV: development
  APP_SECRET_KEY: local-dev-secret-key-32chars-min!
  LOG_LEVEL: info
  MONGODB_URL: mongodb://rift:riftdev@mongodb:27017/rift?authSource=admin
  MONGODB_DATABASE: rift
  REDIS_URL: redis://redis:6379/0
  TEMPORAL_HOST: temporal:7233
  TEMPORAL_NAMESPACE: default
  TEMPORAL_TASK_QUEUE: rift-main
  JWT_SECRET: local-dev-jwt-secret-32chars-min!!
  JWT_ALGORITHM: HS256
  JWT_EXPIRE_MINUTES: "1440"
  BOOTSTRAP_SUPERUSER_USERNAME: master
  BOOTSTRAP_SUPERUSER_PASSWORD: master
  BOOTSTRAP_SUPERUSER_DISPLAY_NAME: Rift Master
  KMS_KEY_REF: local-dev-key
  KMS_PROVIDER: local
  OBJECT_STORE_ENDPOINT: http://seaweedfs:9000
  OBJECT_STORE_BUCKET: rift-artifacts
  OBJECT_STORE_ACCESS_KEY: minioadmin
  OBJECT_STORE_SECRET_KEY: minioadmin
  OBJECT_STORE_REGION: us-east-1
  API_HOST: 0.0.0.0
  API_PORT: "8000"
  API_CORS_ORIGINS: '["http://localhost:3000"]'

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7.0
    container_name: rift-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: rift
      MONGO_INITDB_ROOT_PASSWORD: riftdev
      MONGO_INITDB_DATABASE: rift
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "rift", "-p", "riftdev", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: rift-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  temporal-postgresql:
    image: postgres:15-alpine
    container_name: rift-temporal-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  temporal:
    image: temporalio/auto-setup:1.24
    container_name: rift-temporal
    restart: unless-stopped
    ports:
      - "7233:7233"
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    volumes:
      - ./infra/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.28.0
    container_name: rift-temporal-ui
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

  seaweedfs:
    image: chrislusf/seaweedfs:3.71
    container_name: rift-seaweedfs
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "8888:8888"   # Filer UI
    volumes:
      - seaweedfs_data:/data
      - ./infra/seaweedfs/s3-config.json:/etc/seaweedfs/s3-config.json:ro
    command: server -s3 -s3.port=9000 -s3.config=/etc/seaweedfs/s3-config.json -filer -volume.max=100 -master.volumeSizeLimitMB=200 -ip.bind=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Creates the S3 bucket on first boot
  storage-init:
    image: amazon/aws-cli:2.15.37
    container_name: rift-storage-init
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - aws s3api head-bucket --bucket rift-artifacts --endpoint-url http://seaweedfs:9000 >/dev/null 2>&1 || aws s3api create-bucket --bucket rift-artifacts --endpoint-url http://seaweedfs:9000
    restart: "no"

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    container_name: rift-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    container_name: rift-worker
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: serve
      args:
        # Points to the nginx proxy path so the browser hits the right API
        VITE_API_BASE_URL: /api
    container_name: rift-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
  temporal_postgresql_data:
  seaweedfs_data:
